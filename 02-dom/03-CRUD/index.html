<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD - Sederhana</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(243, 243, 243);
        }
        ul{
            list-style: none;
            padding: 0;
            margin: 0;
            margin-top: 30px;
        }

        li{
            list-style-type: none;
            display: flex;
            border-bottom: 1px solid #afafaf;
            justify-content: space-between;
            padding-bottom: 10px;
            align-items: center;
            font-size: 18px;
        }
        input{
            width: 300px;
            height: 35px;
            border: 1px solid rgb(213, 213, 213);
            padding-left: 10px;
            border-radius: 5px;
            font-size: 16px;
        }

        input:focus{
            border: none;
            outline: none;
            box-shadow: 1px 1px 5px 1px rgba(127, 127, 255, 0.6);
        }

        .input-form button{
            padding: 10px;
            background-color: blue;
            color: white;
            border-radius: 5px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .container{
            box-shadow: 1px 1px 5px 1px rgba(218, 218, 218, 0.4);
            padding: 25px;
            border-radius: 10px;
            background-color: white;
        }

        h2{
            margin-top: -10px;
        }

        .btn-edit, .btn-hapus{
            background-color: rgb(0, 192, 0);
            border: none;
            padding: 10px;
            padding-left: 13px;
            padding-right: 13px;
            color: white;
            font-size: 15px;
            border-radius: 5px;
            cursor: pointer;

        }

        .btn-hapus{
            background-color: rgb(255, 75, 75);
        }

        .selesai{
            text-decoration: line-through;
            color: #afafaf;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Task Manager</h2>
        <div class = "input-form">
            <input type="text" id = "input-teks" placeholder="Ketik tugas baru...">
            <button id="button-tambah">Tambah</button>
        </div>

        <ul id="list-tugas">
            <li>
                <span class = "teks-tugas">Belajar DOM Fundamental</span>
                <div>
                    <button class="btn-edit">Edit</button>
                    <button class="btn-hapus" onclick="confirm('Apakah anda yakin ingin menghapus?')">Hapus</button>
                </div>
            </li>
            
        </ul>
    </div>

    <script src="script.js" ></script>
</body>
</html>
