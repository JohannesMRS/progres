<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Boss Level - Live Review</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background-color: #0f172a; color: #f8fafc; }
        .box { max-width: 500px; background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; }
        h2 { margin-top: 0; color: #38bdf8; }
        
        textarea { width: 100%; height: 80px; padding: 10px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; resize: none; box-sizing: border-box; font-size: 1rem; }
        textarea:focus { border-color: #38bdf8; outline: none; }
        
        button { margin-top: 10px; padding: 10px 20px; background-color: #38bdf8; color: #0f172a; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        
        /* Tempat Komentar Baru Muncul */
        #container-komentar { margin-top: 25px; }
        .item-komentar { background: #334155; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-hapus { background: #ef4444; color: white; padding: 4px 8px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="box">
        <h2>💬 Kolom Ulasan OXA COFFEE</h2>
        
        <textarea id="input-ulasan" placeholder="Tulis ulasan kopimu di sini, Bang..."></textarea>
        <button id="btn-kirim">Kirim Ulasan</button>

        <div id="container-komentar"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
